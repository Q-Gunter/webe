<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Q-Gunter | AI-Orchestrated Pentesting Platform</title>
  <meta name="description" content="Q-Gunter — enterprise B2B automated pentesting platform powered by AI and Post-Quantum Cryptography." />
  <link rel="icon" type="image/png" href="/assets/logo.png" />

  <!-- Tailwind via CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            'q-gold':   '#EAB308',
            'q-cream':  '#F5F5DC',
            'q-dark':   '#000000',
            'q-border': '#332B00',
            'q-panel':  '#0a0a0a',
            'q-muted':  '#1a1a1a'
          },
          fontFamily: {
            mono: ['"IBM Plex Mono"', 'monospace'],
            sans: ['"IBM Plex Sans"', 'system-ui', 'sans-serif']
          }
        }
      }
    };
  </script>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;500;600;700&family=IBM+Plex+Sans:wght@300;400;500;600;700&display=swap"
    rel="stylesheet"
  />

  <!-- GSAP + ScrollTrigger -->
  <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/ScrollTrigger.min.js"></script>

  <!--
    Three.js as ES module (the only path that works in r158+).
    The legacy UMD `examples/js/loaders/GLTFLoader.js` referenced by the brief
    was removed in r147, so we wire up an import map and load GLTFLoader from
    the canonical `examples/jsm/` ESM path instead.
  -->
  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.158.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.158.0/examples/jsm/"
    }
  }
  </script>

  <!-- App styles -->
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body class="font-sans bg-q-dark text-q-cream antialiased">
  <!-- SPA root -->
  <div id="app"></div>

  <!-- Modal mount point -->
  <div id="modal-root"></div>

  <!-- Toast mount point -->
  <div id="toast-root" class="fixed top-6 right-6 z-[9999] flex flex-col gap-2 pointer-events-none"></div>

  <!-- Boot -->
  <script type="module" src="js/app.js"></script>
</body>
</html>
